<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Cinephile • Discover the Seventh Art</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #060606; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes softGlow {
            0% { box-shadow: 0 0 0 0 rgba(230,179,30,0.2); }
            100% { box-shadow: 0 0 0 8px rgba(230,179,30,0); }
        }
        .animate-in {
            animation: fadeSlideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ----------------------------------------------
        //  CINEPHILE PLATFORM – MODERN MOVIE DISCOVERY
        //  React 18 + TMDb API | rich modal, reviews, watchlist
        // ----------------------------------------------
        const { useState, useEffect, useRef, useCallback } = React;

        // ----------  API CONFIGURATION  ----------
        const API_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkMWYyYTdiYzhkNTk1OWU4YjA0MTFjMmRjZjE4ZTU2YyIsIm5iZiI6MTc4MDMzMjgwMC4yMTQwMDAyLCJzdWIiOiI2YTFkYjkwMDI3MDU5MzFjMWZkZDdiMGYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.whrB6ZyUdOIGZUTs4Dk_6e8uFlWzGWur0w9SaHzI_20";
        const BASE_URL = "https://api.themoviedb.org/3";
        const IMG_BASE = "https://image.tmdb.org/t/p";
        const headers = { Authorization: `Bearer ${API_TOKEN}`, "Content-Type": "application/json" };
        const fetcher = (url) => fetch(url, { headers }).then(res => res.json());

        // ----------  UTILITIES  ----------
        const useLocalStorage = (key, initialValue) => {
            const [stored, setStored] = useState(() => {
                try {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch { return initialValue; }
            });
            const setValue = useCallback((value) => {
                setStored(prev => {
                    const newVal = typeof value === 'function' ? value(prev) : value;
                    localStorage.setItem(key, JSON.stringify(newVal));
                    return newVal;
                });
            }, [key]);
            return [stored, setValue];
        };

        const GENRES_MAP = {
            28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy", 80: "Crime",
            99: "Documentary", 18: "Drama", 10751: "Family", 14: "Fantasy", 36: "History",
            27: "Horror", 10402: "Music", 9648: "Mystery", 10749: "Romance", 878: "Sci-Fi",
            10770: "TV Movie", 53: "Thriller", 10752: "War", 37: "Western"
        };

        // ----------  REUSABLE COMPONENTS  ----------
        const StarRating = ({ value, onChange }) => {
            const [hover, setHover] = useState(0);
            return (
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    {[1, 2, 3, 4, 5].map(star => (
                        <span
                            key={star}
                            onClick={() => onChange(star)}
                            onMouseEnter={() => setHover(star)}
                            onMouseLeave={() => setHover(0)}
                            style={{
                                fontSize: 26,
                                cursor: "pointer",
                                color: star <= (hover || value) ? "#F5C518" : "#3A3A4A",
                                transition: "transform 0.1s, color 0.1s",
                                transform: hover === star ? "scale(1.1)" : "scale(1)",
                                display: "inline-block"
                            }}
                        >★</span>
                    ))}
                </div>
            );
        };

        const ScoreBadge = ({ score }) => {
            const percent = Math.round(score * 10);
            const color = percent >= 70 ? "#21D07A" : percent >= 45 ? "#F5C518" : "#E65C4F";
            return (
                <div style={{
                    width: 48, height: 48, borderRadius: "50%", background: "#081C22",
                    border: `3px solid ${color}`, display: "flex", alignItems: "center",
                    justifyContent: "center", fontWeight: 800, backdropFilter: "blur(2px)"
                }}>
                    <span style={{ fontSize: 14, fontWeight: 800, color, letterSpacing: "-0.5px" }}>
                        {percent}<span style={{ fontSize: 8, fontWeight: 600 }}>%</span>
                    </span>
                </div>
            );
        };

        // ----------  MOVIE CARD (HOVER + WATCHLIST BUTTON)  ----------
        const MovieCard = ({ movie, onClick, isInWatchlist, onWatchlistToggle }) => {
            const [hover, setHover] = useState(false);
            const posterUrl = movie.poster_path ? `${IMG_BASE}/w342${movie.poster_path}` : null;
            const year = movie.release_date?.slice(0, 4) || "";
            return (
                <div
                    onClick={() => onClick(movie)}
                    onMouseEnter={() => setHover(true)}
                    onMouseLeave={() => setHover(false)}
                    style={{
                        position: "relative", borderRadius: 14, overflow: "hidden", cursor: "pointer",
                        background: "#111118", transition: "transform 0.25s cubic-bezier(0.2,0.9,0.4,1.1), box-shadow 0.25s",
                        transform: hover ? "scale(1.04) translateY(-6px)" : "scale(1)",
                        boxShadow: hover ? "0 25px 35px -12px rgba(0,0,0,0.75)" : "0 6px 14px rgba(0,0,0,0.4)",
                        willChange: "transform"
                    }}
                >
                    <div style={{ aspectRatio: "2/3", background: "#0a0a12" }}>
                        {posterUrl ? (
                            <img src={posterUrl} alt={movie.title} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} loading="lazy" />
                        ) : (
                            <div style={{ width: "100%", height: "100%", display: "flex", alignItems: "center", justifyContent: "center", background: "#1C1C2A", textAlign: "center", padding: 12 }}>
                                <span style={{ color: "#6A6A7A", fontSize: 12, fontWeight: 500 }}>{movie.title}</span>
                            </div>
                        )}
                    </div>
                    <div style={{
                        position: "absolute", bottom: 0, left: 0, right: 0,
                        background: "linear-gradient(to top, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.7) 60%, transparent 100%)",
                        padding: "28px 12px 12px", opacity: hover ? 1 : 0, transition: "opacity 0.2s"
                    }}>
                        <p style={{ color: "#fff", fontWeight: 700, fontSize: 13, marginBottom: 6, lineHeight: 1.3 }}>{movie.title}</p>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            {year && <span style={{ color: "#bbb", fontSize: 10 }}>{year}</span>}
                            <span style={{ color: "#F5C518", fontSize: 11, fontWeight: 600 }}>★ {movie.vote_average?.toFixed(1)}</span>
                        </div>
                    </div>
                    <button
                        onClick={(e) => { e.stopPropagation(); onWatchlistToggle(movie); }}
                        style={{
                            position: "absolute", top: 10, right: 10, background: isInWatchlist ? "#F5C518" : "rgba(0,0,0,0.65)",
                            border: "none", borderRadius: 40, width: 30, height: 30, display: "flex", alignItems: "center",
                            justifyContent: "center", cursor: "pointer", fontSize: 16, fontWeight: "bold", color: isInWatchlist ? "#000" : "#fff",
                            backdropFilter: "blur(4px)", opacity: hover ? 1 : 0, transition: "all 0.2s"
                        }}
                    >{isInWatchlist ? "✓" : "+"}</button>
                </div>
            );
        };

        // ----------  HERO SLIDER (CINEMATIC BACKDROP)  ----------
        const HeroSlider = ({ movies, onMovieClick }) => {
            const [index, setIndex] = useState(0);
            const [visible, setVisible] = useState(true);
            const intervalRef = useRef(null);
            const cycleMovies = useCallback(() => {
                setVisible(false);
                setTimeout(() => {
                    setIndex(prev => (prev + 1) % Math.min(movies.length, 8));
                    setVisible(true);
                }, 280);
            }, [movies.length]);

            useEffect(() => {
                if (!movies.length) return;
                intervalRef.current = setInterval(cycleMovies, 6200);
                return () => clearInterval(intervalRef.current);
            }, [movies.length, cycleMovies]);

            const movie = movies[index];
            if (!movie) return null;
            const backdrop = movie.backdrop_path ? `${IMG_BASE}/original${movie.backdrop_path}` : null;
            const year = movie.release_date?.slice(0, 4);
            const genreTags = (movie.genre_ids || []).slice(0, 3).map(id => GENRES_MAP[id]).filter(Boolean);

            return (
                <div style={{ position: "relative", height: "88vh", minHeight: 560, overflow: "hidden", background: "#020208" }}>
                    {backdrop && (
                        <div style={{ position: "absolute", inset: 0, opacity: visible ? 1 : 0, transition: "opacity 0.5s ease" }}>
                            <img src={backdrop} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "top 20%" }} />
                            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(110deg, #060606 0%, rgba(6,6,6,0.5) 40%, rgba(0,0,0,0.2) 70%)" }} />
                            <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: "45%", background: "linear-gradient(to top, #060606, transparent)" }} />
                        </div>
                    )}
                    <div style={{
                        position: "absolute", bottom: "12%", left: "5%", right: "5%", maxWidth: 680,
                        opacity: visible ? 1 : 0, transition: "opacity 0.4s", animation: visible ? "fadeSlideUp 0.4s ease-out" : "none"
                    }}>
                        <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
                            {genreTags.map(g => (
                                <span key={g} style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.07em", textTransform: "uppercase", color: "#F5C518", border: "1px solid rgba(245,197,24,0.4)", padding: "4px 12px", borderRadius: 40 }}>{g}</span>
                            ))}
                        </div>
                        <h2 style={{ fontSize: "clamp(34px, 5vw, 60px)", fontWeight: 800, color: "#fff", fontFamily: "'Playfair Display', serif", lineHeight: 1.1, marginBottom: 16, textShadow: "0 2px 20px rgba(0,0,0,0.6)" }}>{movie.title}</h2>
                        <div style={{ display: "flex", alignItems: "center", gap: 20, marginBottom: 20, flexWrap: "wrap" }}>
                            <span style={{ color: "#F5C518", fontWeight: 800, fontSize: 18 }}>★ {movie.vote_average?.toFixed(1)}</span>
                            {year && <span style={{ color: "#aaa", fontWeight: 500 }}>{year}</span>}
                            <ScoreBadge score={movie.vote_average} />
                        </div>
                        <p style={{ color: "#DDD", fontSize: 15, lineHeight: 1.7, maxWidth: 580, marginBottom: 30 }}>
                            {movie.overview?.slice(0, 210)}{movie.overview?.length > 210 ? "..." : ""}
                        </p>
                        <button onClick={() => onMovieClick(movie)} style={{
                            background: "#F5C518", border: "none", padding: "12px 34px", borderRadius: 40,
                            fontSize: 15, fontWeight: 700, color: "#121212", cursor: "pointer", transition: "all 0.2s",
                            boxShadow: "0 4px 14px rgba(0,0,0,0.3)"
                        }} onMouseEnter={e => e.currentTarget.style.background = "#ffdb4d"} onMouseLeave={e => e.currentTarget.style.background = "#F5C518"}>
                            Explore masterpiece
                        </button>
                    </div>
                    <div style={{ position: "absolute", bottom: "6%", right: "5%", display: "flex", gap: 10 }}>
                        {movies.slice(0, 8).map((_, i) => (
                            <button key={i} onClick={() => { setVisible(false); setTimeout(() => { setIndex(i); setVisible(true); }, 300); }}
                                style={{ width: i === index ? 28 : 7, height: 7, borderRadius: 10, border: "none", background: i === index ? "#F5C518" : "rgba(255,255,255,0.4)", transition: "all 0.2s", cursor: "pointer" }} />
                        ))}
                    </div>
                </div>
            );
        };

        // ----------  SCROLLABLE ROW  ----------
        const MovieRow = ({ title, movies, onMovieClick, watchlist, onWatchlistToggle, accentColor = "#F5C518" }) => {
            const rowRef = useRef(null);
            return (
                <div style={{ marginBottom: 54 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 5%", marginBottom: 18 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{ width: 5, height: 28, background: accentColor, borderRadius: 5 }}></div>
                            <h3 style={{ color: "#fff", fontSize: 21, fontWeight: 700, fontFamily: "'Playfair Display', serif", letterSpacing: "-0.2px" }}>{title}</h3>
                        </div>
                        <div style={{ display: "flex", gap: 12 }}>
                            <button onClick={() => rowRef.current?.scrollBy({ left: -320, behavior: "smooth" })} style={{ background: "#23232E", border: "none", width: 34, height: 34, borderRadius: 50, color: "white", fontSize: 20, cursor: "pointer" }}>‹</button>
                            <button onClick={() => rowRef.current?.scrollBy({ left: 320, behavior: "smooth" })} style={{ background: "#23232E", border: "none", width: 34, height: 34, borderRadius: 50, color: "white", fontSize: 20, cursor: "pointer" }}>›</button>
                        </div>
                    </div>
                    <div ref={rowRef} style={{ display: "flex", gap: 16, overflowX: "auto", padding: "8px 5%", scrollbarWidth: "none" }}>
                        {movies.slice(0, 20).map(m => (
                            <div key={m.id} style={{ flexShrink: 0, width: 166 }}>
                                <MovieCard movie={m} onClick={onMovieClick} isInWatchlist={watchlist.some(w => w.id === m.id)} onWatchlistToggle={onWatchlistToggle} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // ----------  CAST CARD FOR MODAL  ----------
        const CastCard = ({ person }) => (
            <div style={{ flexShrink: 0, width: 100, textAlign: "center" }}>
                <div style={{ width: 80, height: 80, borderRadius: 100, overflow: "hidden", margin: "0 auto 8px", background: "#1E1E2C", border: "2px solid #2C2C3A" }}>
                    {person.profile_path ? <img src={`${IMG_BASE}/w185${person.profile_path}`} style={{ width: "100%", height: "100%", objectFit: "cover" }} alt={person.name} /> : <div style={{ fontSize: 36, lineHeight: "80px", textAlign: "center" }}>🎭</div>}
                </div>
                <p style={{ fontSize: 12, fontWeight: 600, color: "#fff", margin: "4px 0 2px" }}>{person.name}</p>
                <p style={{ fontSize: 11, color: "#999" }}>{person.character}</p>
            </div>
        );

        // ----------  FULL MOVIE MODAL (TABS: ABOUT, CAST, REVIEWS, SIMILAR)  ----------
        const MovieModal = ({ movieId, onClose, watchlist, onWatchlistToggle, reviews, onAddReview }) => {
            const [movie, setMovie] = useState(null);
            const [credits, setCredits] = useState(null);
            const [similar, setSimilar] = useState([]);
            const [loading, setLoading] = useState(true);
            const [activeTab, setActiveTab] = useState("about");
            const [reviewText, setReviewText] = useState("");
            const [reviewRating, setReviewRating] = useState(0);
            const modalRef = useRef(null);

            useEffect(() => {
                if (!movieId) return;
                setLoading(true);
                setActiveTab("about");
                Promise.all([
                    fetcher(`${BASE_URL}/movie/${movieId}?language=en-US`),
                    fetcher(`${BASE_URL}/movie/${movieId}/credits?language=en-US`),
                    fetcher(`${BASE_URL}/movie/${movieId}/similar?language=en-US&page=1`)
                ]).then(([m, c, s]) => {
                    setMovie(m);
                    setCredits(c);
                    setSimilar(s.results?.slice(0, 12) || []);
                    setLoading(false);
                }).catch(() => setLoading(false));
            }, [movieId]);

            const handleSubmitReview = () => {
                if (!reviewText.trim() || reviewRating === 0) return;
                onAddReview(movieId, { text: reviewText.trim(), rating: reviewRating, date: new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) });
                setReviewText("");
                setReviewRating(0);
            };

            const movieReviews = reviews[movieId] || [];
            const inWatchlist = watchlist.some(w => w.id === movieId);

            if (!movieId) return null;

            return (
                <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.88)", backdropFilter: "blur(10px)", zIndex: 1300, display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", overflowY: "auto" }}>
                    <div ref={modalRef} onClick={e => e.stopPropagation()} style={{ maxWidth: 1000, width: "100%", background: "#0F0F17", borderRadius: 32, overflow: "hidden", boxShadow: "0 50px 90px rgba(0,0,0,0.6)", border: "1px solid #2A2A38" }}>
                        {loading ? (
                            <div style={{ height: 400, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <div style={{ width: 45, height: 45, border: "3px solid #2A2A38", borderTop: "3px solid #F5C518", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
                                <style>{`@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`}</style>
                            </div>
                        ) : movie && (
                            <>
                                <div style={{ position: "relative", height: 360, background: "#000" }}>
                                    {movie.backdrop_path && <img src={`${IMG_BASE}/original${movie.backdrop_path}`} style={{ width: "100%", height: "100%", objectFit: "cover", opacity: 0.7 }} alt="" />}
                                    <div style={{ position: "absolute", inset: 0, background: "linear-gradient(90deg, #0F0F17 0%, transparent 55%, rgba(0,0,0,0.8) 100%)" }} />
                                    <button onClick={onClose} style={{ position: "absolute", top: 20, right: 24, background: "rgba(0,0,0,0.6)", border: "none", borderRadius: 50, width: 40, height: 40, fontSize: 22, color: "#fff", cursor: "pointer" }}>✕</button>
                                    <div style={{ position: "absolute", bottom: 24, left: 30, right: 30 }}>
                                        <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
                                            {movie.genres?.slice(0, 4).map(g => <span key={g.id} style={{ background: "rgba(245,197,24,0.15)", padding: "4px 14px", borderRadius: 50, fontSize: 12, fontWeight: 600, color: "#F5C518" }}>{g.name}</span>)}
                                        </div>
                                        <h2 style={{ fontSize: 38, fontWeight: 800, color: "#fff", fontFamily: "'Playfair Display', serif", marginBottom: 12 }}>{movie.title}</h2>
                                        <div style={{ display: "flex", alignItems: "center", gap: 18, flexWrap: "wrap" }}>
                                            <ScoreBadge score={movie.vote_average} />
                                            <div><p style={{ color: "#aaa", fontSize: 12 }}>User Score</p><p style={{ fontWeight: 700, color: "#F5C518" }}>{movie.vote_average?.toFixed(1)} / 10</p></div>
                                            {movie.release_date && <span style={{ color: "#ccc" }}>{movie.release_date.slice(0, 4)}</span>}
                                            {movie.runtime && <span style={{ color: "#ccc" }}>{Math.floor(movie.runtime / 60)}h {movie.runtime % 60}m</span>}
                                            <button onClick={() => onWatchlistToggle(movie)} style={{ background: inWatchlist ? "#F5C518" : "transparent", border: `1px solid ${inWatchlist ? "#F5C518" : "#666"}`, padding: "8px 26px", borderRadius: 40, fontWeight: 600, color: inWatchlist ? "#000" : "#fff", cursor: "pointer" }}>{inWatchlist ? "✓ In Watchlist" : "+ Add to Watchlist"}</button>
                                        </div>
                                    </div>
                                </div>
                                <div style={{ display: "flex", gap: 2, padding: "0 28px", borderBottom: "1px solid #22222E" }}>
                                    {["about", "cast", "reviews", "similar"].map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} style={{ background: "none", border: "none", padding: "16px 24px", fontWeight: 600, fontSize: 15, color: activeTab === tab ? "#F5C518" : "#8A8A9A", borderBottom: activeTab === tab ? "2px solid #F5C518" : "2px solid transparent", cursor: "pointer", textTransform: "capitalize" }}>{tab}</button>
                                    ))}
                                </div>
                                <div style={{ padding: "30px 28px", maxHeight: 480, overflowY: "auto" }}>
                                    {activeTab === "about" && (
                                        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                                            <p style={{ color: "#ddd", lineHeight: 1.75, fontSize: 15 }}>{movie.overview || "No synopsis provided."}</p>
                                            {movie.tagline && <p style={{ color: "#F5C518", fontStyle: "italic", borderLeft: "3px solid #F5C518", paddingLeft: 18 }}>“{movie.tagline}”</p>}
                                            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18, marginTop: 8 }}>
                                                <div style={{ background: "#191923", padding: 14, borderRadius: 20 }}><span style={{ color: "#888", fontSize: 12 }}>Status</span><p style={{ color: "#fff", fontWeight: 600 }}>{movie.status || "—"}</p></div>
                                                <div style={{ background: "#191923", padding: 14, borderRadius: 20 }}><span style={{ color: "#888", fontSize: 12 }}>Original Language</span><p style={{ color: "#fff", fontWeight: 600 }}>{movie.original_language?.toUpperCase()}</p></div>
                                                {movie.budget > 0 && <div style={{ background: "#191923", padding: 14, borderRadius: 20 }}><span style={{ color: "#888", fontSize: 12 }}>Budget</span><p style={{ color: "#fff" }}>${(movie.budget / 1e6).toFixed(1)}M</p></div>}
                                                {movie.revenue > 0 && <div style={{ background: "#191923", padding: 14, borderRadius: 20 }}><span style={{ color: "#888", fontSize: 12 }}>Revenue</span><p style={{ color: "#fff" }}>${(movie.revenue / 1e6).toFixed(1)}M</p></div>}
                                            </div>
                                        </div>
                                    )}
                                    {activeTab === "cast" && (
                                        <div><div style={{ display: "flex", gap: 24, overflowX: "auto", paddingBottom: 12 }}>{credits?.cast?.slice(0, 16).map(p => <CastCard key={p.id} person={p} />)}</div></div>
                                    )}
                                    {activeTab === "reviews" && (
                                        <div>
                                            <div style={{ background: "#181822", borderRadius: 24, padding: 20, marginBottom: 28 }}>
                                                <p style={{ color: "#ccc", marginBottom: 12 }}>Write your own verdict</p>
                                                <StarRating value={reviewRating} onChange={setReviewRating} />
                                                <textarea value={reviewText} onChange={e => setReviewText(e.target.value)} placeholder="Share your insight..." rows={3} style={{ width: "100%", marginTop: 16, background: "#0A0A10", border: "1px solid #333", borderRadius: 16, padding: 14, color: "#fff", resize: "vertical", fontFamily: "inherit" }} />
                                                <button onClick={handleSubmitReview} style={{ marginTop: 14, background: "#F5C518", border: "none", padding: "10px 26px", borderRadius: 40, fontWeight: 700, color: "#000", cursor: "pointer" }}>Post Review</button>
                                            </div>
                                            {movieReviews.length === 0 ? <p style={{ color: "#777", textAlign: "center", padding: 28 }}>No reviews yet – be the first critic.</p> : movieReviews.map((rev, idx) => (
                                                <div key={idx} style={{ background: "#14141E", borderRadius: 18, padding: 18, marginBottom: 14, border: "1px solid #2A2A34" }}>
